# Alabastrine-bg — terminal-adaptive, background tinting variant (Sublime-style)
# Colors sourced from terminal ANSI palette; no hardcoded hex

# UI
"ui.background"           = {}
"ui.text"                 = "default"
"ui.linenr"               = { fg = "dark-gray" }
"ui.linenr.selected"      = "default"
"ui.selection"            = { bg = "light-blue" }
"ui.cursor"               = { modifiers = ["reversed"] }
"ui.cursor.match"         = { bg = "light-blue" }
"ui.cursorline.primary"   = {}
"ui.statusline"           = { modifiers = ["reversed"] }
"ui.statusline.inactive"  = { fg = "dark-gray" }
"ui.virtual.ruler"        = {}
"ui.virtual.inlay-hint"   = { fg = "dark-gray" }
"ui.popup"                = {}
"ui.menu"                 = {}
"ui.menu.selected"        = { bg = "light-blue" }
"ui.window"               = {}
"ui.bufferline"           = {}
"ui.bufferline.active"    = { modifiers = ["bold"] }

# Syntax — Alabaster principle: background tinting (Sublime-style)
"string"          = { bg = "light-green" }
"comment"         = { bg = "light-yellow" }
"constant"        = { bg = "light-magenta" }
"function"        = { bg = "light-blue" }
"function.method" = { bg = "light-blue" }

# Diagnostics
"error"                       = "red"
"warning"                     = "yellow"
"diagnostic.error"            = { underline = { style = "curl" } }
"diagnostic.warning"          = { underline = { color = "yellow", style = "curl" } }
"diagnostic.unnecessary"      = { modifiers = ["dim"] }
"diagnostic.deprecated"       = { modifiers = ["crossed_out"] }

# Diff
"diff.plus"  = "green"
"diff.minus" = "red"
"diff.delta" = "yellow"
